<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A sleek, real-time chat application with secure authentication.">
    <title>Realtime Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
</head>

<body>

    <!-- LOGIN SECTION -->
    <div id="login-container" class="container">
        <div class="brand-icon">💬</div>
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to continue chatting</p>
        <input type="email" id="email" placeholder="Email address" autocomplete="email">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
        <div class="btn-group">
            <button id="login-btn">Sign In</button>
            <button id="signup-btn" class="secondary">Create Account</button>
        </div>
    </div>

    <!-- CHAT SECTION (Hidden by default) -->
    <div id="chat-container" class="container hidden">
        <div class="chat-header">
            <span><span class="status-dot"></span> Global Chat</span>
            <button id="logout-btn">Logout</button>
        </div>
        <div id="messages"></div>
        <form id="chat-form">
            <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
            <button type="submit" aria-label="Send message">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </form>
    </div>

    <!-- FIREBASE SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 1. PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "AIzaSyDmbn5MZ0wFsFo_zpZiaL878CxTqMgRN5c",
            authDomain: "mychatapp-3ca8c.firebaseapp.com",
            projectId: "mychatapp-3ca8c",
            storageBucket: "mychatapp-3ca8c.firebasestorage.app",
            messagingSenderId: "502281358029",
            appId: "1:502281358029:web:38f200a0e7c754cd41f784"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI Elements
        const loginContainer = document.getElementById('login-container');
        const chatContainer = document.getElementById('chat-container');
        const messagesDiv = document.getElementById('messages');
        const chatForm = document.getElementById('chat-form');
        const msgInput = document.getElementById('msg-input');

        // --- AUTHENTICATION ---
        document.getElementById('signup-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try { await createUserWithEmailAndPassword(auth, email, pass); }
            catch (e) { alert(e.message); }
        };

        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try { await signInWithEmailAndPassword(auth, email, pass); }
            catch (e) { alert(e.message); }
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // Monitor Auth State (Are we logged in or not?)
        let currentUserEmail = '';
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserEmail = user.email;
                loginContainer.classList.add('hidden');
                chatContainer.classList.remove('hidden');
                loadMessages();
            } else {
                currentUserEmail = '';
                loginContainer.classList.remove('hidden');
                chatContainer.classList.add('hidden');
            }
        });

        // --- CHAT LOGIC ---
        async function loadMessages() {
            // Query: messages collection, ordered by time, limit to last 200
            const q = query(collection(db, "messages"), orderBy("createdAt", "desc"), limit(200));

            // onSnapshot = Real-time listener (Minimal lag!)
            onSnapshot(q, (snapshot) => {
                messagesDiv.innerHTML = '';
                // Reverse because we queried "desc"
                const msgs = snapshot.docs.map(doc => doc.data()).reverse();

                if (msgs.length === 0) {
                    messagesDiv.innerHTML = `
                        <div class="empty-state">
                            <span class="empty-icon">💬</span>
                            <span>No messages yet. Say hi!</span>
                        </div>
                    `;
                    return;
                }

                msgs.forEach(msg => {
                    const div = document.createElement('div');
                    div.classList.add('msg');

                    const isSelf = msg.user === currentUserEmail;
                    div.classList.add(isSelf ? 'msg-self' : 'msg-other');

                    const authorName = msg.user ? msg.user.split('@')[0] : 'anon';

                    div.innerHTML = `
                        <span class="msg-author">${isSelf ? 'You' : authorName}</span>
                        <span class="msg-text">${escapeHtml(msg.text)}</span>
                    `;
                    messagesDiv.appendChild(div);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }

        // Simple HTML escape to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            if (msgInput.value.trim() === '') return;

            await addDoc(collection(db, "messages"), {
                text: msgInput.value,
                user: auth.currentUser.email,
                createdAt: serverTimestamp()
            });
            msgInput.value = '';
        };
    </script>
</body>

</html>
