<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A sleek, real-time chat application with secure authentication.">
    <title>Realtime Chat</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
</head>

<body>

    <!-- LOGIN SECTION -->
    <div id="login-container" class="container">
        <div class="brand-icon">💬</div>
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to continue chatting</p>
        <input type="email" id="email" placeholder="Email address" autocomplete="email">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
        <div class="btn-group">
            <button id="login-btn">Sign In</button>
            <button id="signup-btn" class="secondary">Create Account</button>
        </div>
    </div>

    <!-- CHAT SECTION (Hidden by default) -->
    <div id="chat-container" class="container hidden">
        <div class="chat-header">
            <span><span class="status-dot"></span> Global Chat</span>
            <div class="header-actions">
                <a id="admin-link" href="admin.html" class="admin-link hidden" title="Admin Panel">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    Admin
                </a>
                <button id="logout-btn">Logout</button>
            </div>
        </div>
        <div id="messages"></div>
        <!-- Upload progress bar -->
        <div id="upload-progress-wrap" class="hidden">
            <div id="upload-progress-bar"></div>
            <span id="upload-progress-label">Uploading…</span>
        </div>

        <form id="chat-form">
            <!-- Hidden file input -->
            <input type="file" id="file-input" accept="image/*,video/*,.pdf,.doc,.docx,.txt,.zip" style="display:none">
            <!-- Paperclip button -->
            <button type="button" id="attach-btn" aria-label="Attach file" class="icon-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48">
                    </path>
                </svg>
            </button>
            <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off">
            <button type="submit" aria-label="Send message">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </form>
    </div>

    <!-- FIREBASE SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, limit, onSnapshot, serverTimestamp, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ── Cloudinary config (free, no credit card) ──────────────────────────
        // 1. Sign up at cloudinary.com
        // 2. Settings → Upload → Upload Presets → Add preset → set Unsigned
        // 3. Replace the two values below
        const CLOUDINARY_CLOUD_NAME = 'dvttuyahf';   // e.g. 'dxyz123'
        const CLOUDINARY_UPLOAD_PRESET = 'chatapp';    // e.g. 'chat_uploads'
        // ─────────────────────────────────────────────────────────────────────

        // 1. PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = {
            apiKey: "AIzaSyDmbn5MZ0wFsFo_zpZiaL878CxTqMgRN5c",
            authDomain: "mychatapp-3ca8c.firebaseapp.com",
            projectId: "mychatapp-3ca8c",
            storageBucket: "mychatapp-3ca8c.firebasestorage.app",
            messagingSenderId: "502281358029",
            appId: "1:502281358029:web:38f200a0e7c754cd41f784"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI Elements
        const loginContainer = document.getElementById('login-container');
        const chatContainer = document.getElementById('chat-container');
        const messagesDiv = document.getElementById('messages');

        // ── File download handler (fetch→blob so cross-origin download works) ──
        messagesDiv.addEventListener('click', async (e) => {
            const trigger = e.target.closest('.dl-trigger');
            if (!trigger) return;
            e.preventDefault();

            const url      = trigger.dataset.url;
            const filename = trigger.dataset.name || 'download';

            // Visual feedback
            trigger.classList.add('downloading');
            trigger.querySelector('.msg-file-ext').textContent = '…';

            try {
                const res  = await fetch(url, { mode: 'cors' });
                const blob = await res.blob();
                const blobUrl = URL.createObjectURL(blob);

                const a = document.createElement('a');
                a.href     = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
            } catch {
                // CORS fallback: open in new tab
                window.open(url, '_blank');
            } finally {
                trigger.classList.remove('downloading');
                const ext = filename.split('.').pop().toUpperCase();
                trigger.querySelector('.msg-file-ext').textContent = ext;
            }
        });
        const chatForm = document.getElementById('chat-form');
        const msgInput = document.getElementById('msg-input');
        const fileInput = document.getElementById('file-input');
        const attachBtn = document.getElementById('attach-btn');
        const uploadProgressWrap = document.getElementById('upload-progress-wrap');
        const uploadProgressBar = document.getElementById('upload-progress-bar');
        const uploadProgressLabel = document.getElementById('upload-progress-label');

        // Open file picker when paperclip is clicked
        attachBtn.onclick = () => fileInput.click();

        // When a file is selected, send it immediately
        fileInput.onchange = () => {
            const file = fileInput.files[0];
            if (!file) return;
            if (file.size > 10 * 1024 * 1024) {
                alert('File too large. Max size is 10 MB.');
                fileInput.value = '';
                return;
            }
            uploadAndSend(file);
        };

        async function uploadAndSend(file) {
            // Show progress bar
            uploadProgressWrap.classList.remove('hidden');
            uploadProgressBar.style.width = '5%';
            uploadProgressLabel.textContent = 'Uploading…';

            try {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

                // Use XMLHttpRequest so we can track real upload progress
                const downloadURL = await new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`);

                    xhr.upload.onprogress = (e) => {
                        if (e.lengthComputable) {
                            const pct = Math.round((e.loaded / e.total) * 100);
                            uploadProgressBar.style.width = pct + '%';
                            uploadProgressLabel.textContent = `Uploading… ${pct}%`;
                        }
                    };

                    xhr.onload = () => {
                        if (xhr.status === 200) {
                            const res = JSON.parse(xhr.responseText);
                            resolve(res.secure_url);
                        } else {
                            reject(new Error('Upload failed — check your Cloud name & preset.'));
                        }
                    };

                    xhr.onerror = () => reject(new Error('Network error during upload.'));
                    xhr.send(formData);
                });

                const isImage = file.type.startsWith('image/');
                const isVideo = file.type.startsWith('video/');
                let attachmentType = 'file';
                if (isImage) attachmentType = 'image';
                else if (isVideo) attachmentType = 'video';

                await addDoc(collection(db, 'messages'), {
                    text: msgInput.value.trim() || '',
                    user: auth.currentUser.email,
                    createdAt: serverTimestamp(),
                    attachmentUrl: downloadURL,
                    attachmentType,
                    attachmentName: file.name
                });

                msgInput.value = '';
            } catch (err) {
                alert(err.message);
            } finally {
                uploadProgressWrap.classList.add('hidden');
                fileInput.value = '';
            }
        }

        // --- AUTHENTICATION ---
        document.getElementById('signup-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, 'users', cred.user.uid), {
                    uid: cred.user.uid,
                    email: cred.user.email,
                    role: cred.user.email === 'admin@admin.com' ? 'master' : 'user',
                    status: 'active',
                    createdAt: serverTimestamp()
                });
            } catch (e) { alert(e.message); }
        };

        document.getElementById('login-btn').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try { await signInWithEmailAndPassword(auth, email, pass); }
            catch (e) { alert(e.message); }
        };

        document.getElementById('logout-btn').onclick = () => signOut(auth);

        // Monitor Auth State
        let currentUserEmail = '';
        let unsubUserListener = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                const userRef = doc(db, 'users', user.uid);
                let userSnap = await getDoc(userRef);

                // Create record if first login (existing users)
                if (!userSnap.exists()) {
                    await setDoc(userRef, {
                        uid: user.uid,
                        email: user.email,
                        role: user.email === 'admin@admin.com' ? 'master' : 'user',
                        status: 'active',
                        createdAt: serverTimestamp()
                    });
                    userSnap = await getDoc(userRef);
                }

                const userData = userSnap.data();

                // Always keep admin@admin.com as master
                if (user.email === 'admin@admin.com' && userData.role !== 'master') {
                    await updateDoc(userRef, { role: 'master' });
                }

                // Block suspended users
                if (userData.status === 'suspended') {
                    await signOut(auth);
                    alert('Your account has been suspended. Contact an admin.');
                    return;
                }

                // Real-time suspension listener (kicks user if suspended mid-session)
                if (unsubUserListener) unsubUserListener();
                unsubUserListener = onSnapshot(userRef, async (snap) => {
                    if (snap.exists() && snap.data().status === 'suspended') {
                        if (unsubUserListener) unsubUserListener();
                        await signOut(auth);
                        alert('Your account has been suspended by an admin.');
                    }
                });

                // Show admin link if admin/master
                const role = userData.role;
                const adminLink = document.getElementById('admin-link');
                if (role === 'admin' || role === 'master') {
                    adminLink.classList.remove('hidden');
                } else {
                    adminLink.classList.add('hidden');
                }

                currentUserEmail = user.email;
                loginContainer.classList.add('hidden');
                chatContainer.classList.remove('hidden');
                loadMessages();
            } else {
                if (unsubUserListener) { unsubUserListener(); unsubUserListener = null; }
                currentUserEmail = '';
                loginContainer.classList.remove('hidden');
                chatContainer.classList.add('hidden');
                document.getElementById('admin-link').classList.add('hidden');
            }
        });

        // --- CHAT LOGIC ---
        async function loadMessages() {
            // Query: messages collection, ordered by time, limit to last 200
            const q = query(collection(db, "messages"), orderBy("createdAt", "desc"), limit(200));

            // onSnapshot = Real-time listener (Minimal lag!)
            onSnapshot(q, (snapshot) => {
                messagesDiv.innerHTML = '';
                // Reverse because we queried "desc"
                const msgs = snapshot.docs.map(doc => doc.data()).reverse();

                if (msgs.length === 0) {
                    messagesDiv.innerHTML = `
                        <div class="empty-state">
                            <span class="empty-icon">💬</span>
                            <span>No messages yet. Say hi!</span>
                        </div>
                    `;
                    return;
                }

                msgs.forEach(msg => {
                    const div = document.createElement('div');
                    div.classList.add('msg');

                    const isSelf = msg.user === currentUserEmail;
                    div.classList.add(isSelf ? 'msg-self' : 'msg-other');

                    const authorName = msg.user ? msg.user.split('@')[0] : 'anon';

                    // Build attachment HTML
                    let attachmentHtml = '';
                    if (msg.attachmentUrl) {
                        if (msg.attachmentType === 'image') {
                            attachmentHtml = `<a href="${msg.attachmentUrl}" target="_blank" rel="noopener">
                                <img class="msg-image" src="${msg.attachmentUrl}" alt="${escapeHtml(msg.attachmentName || 'image')}" loading="lazy">
                            </a>`;
                        } else if (msg.attachmentType === 'video') {
                            attachmentHtml = `<video class="msg-video" controls>
                                <source src="${msg.attachmentUrl}">
                            </video>`;
                        } else {
                            // Use fetch→blob download so cross-origin download works
                            const ext = (msg.attachmentName || '').split('.').pop().toUpperCase() || 'FILE';
                            attachmentHtml = `<a class="msg-file dl-trigger"
                                data-url="${msg.attachmentUrl}"
                                data-name="${escapeHtml(msg.attachmentName || 'download')}"
                                href="#">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                                <span>
                                    <span class="msg-file-name">${escapeHtml(msg.attachmentName || 'Download file')}</span>
                                    <span class="msg-file-ext">${escapeHtml(ext)}</span>
                                </span>
                            </a>`;
                        }
                    }

                    div.innerHTML = `
                        <span class="msg-author">${isSelf ? 'You' : authorName}</span>
                        ${attachmentHtml}
                        ${msg.text ? `<span class="msg-text">${escapeHtml(msg.text)}</span>` : ''}
                    `;
                    messagesDiv.appendChild(div);
                });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }

        // Simple HTML escape to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = msgInput.value.trim();
            if (!text) return;

            await addDoc(collection(db, "messages"), {
                text,
                user: auth.currentUser.email,
                createdAt: serverTimestamp()
            });
            msgInput.value = '';
        };
    </script>
</body>

</html>
